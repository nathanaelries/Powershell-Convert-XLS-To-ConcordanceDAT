name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar
          - os: macos-latest
            rid: osx-arm64
            archive: tar
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Xls2Dat.sln

      - name: Test
        run: dotnet test Xls2Dat.sln -c Release --no-restore --nologo

      - name: Publish
        run: dotnet publish src/Xls2Dat.Cli -c Release -r ${{ matrix.rid }} --self-contained -o publish/${{ matrix.rid }} /p:DebugType=None /p:DebugSymbols=false

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "xls2dat-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath $asset
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        run: |
          asset="xls2dat-${{ matrix.rid }}.tar.gz"
          chmod +x publish/${{ matrix.rid }}/xls2dat
          tar -czf "$asset" -C publish/${{ matrix.rid }} .
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: xls2dat-${{ matrix.rid }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
          append_body: true
          body: |
            ## Downloads

            | OS | Architecture | File |
            | --- | --- | --- |
            | Windows | x64 | [xls2dat-win-x64.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xls2dat-win-x64.zip) |
            | Linux | x64 | [xls2dat-linux-x64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xls2dat-linux-x64.tar.gz) |
            | macOS | Apple Silicon | [xls2dat-osx-arm64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xls2dat-osx-arm64.tar.gz) |

            ### First-launch notes

            - **macOS:** unsigned binary — run `xattr -d com.apple.quarantine ./xls2dat` once to bypass Gatekeeper.
            - **Windows:** SmartScreen may warn on the unsigned `.exe` — click *More info* → *Run anyway*.
            - **Linux:** `chmod +x xls2dat` after extracting if your tar tool dropped the executable bit.
